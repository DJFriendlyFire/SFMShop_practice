<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ SFMShop Admin</title>
    <style>
        /* 🔹 Простые стили для наглядности */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #f5f5f5; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: white;
                     padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; color: #333; }
        h2 { margin: 24px 0 12px; color: #555; border-bottom: 2px solid #eee; padding-bottom: 8px; }

        /* 🔹 Форма */
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: 500; color: #444; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd;
                          border-radius: 4px; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #007bff; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px;
                 border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.secondary { background: #6c757d; }
        button.secondary:hover { background: #545b62; }
        button.danger { background: #dc3545; }
        button.danger:hover { background: #bd2130; }

        /* 🔹 Сообщения */
        .message { padding: 12px; margin: 16px 0; border-radius: 4px; display: none; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.show { display: block; }

        /* 🔹 Авторизация */
        .auth-section { background: #f8f9fa; padding: 16px; border-radius: 4px; margin-bottom: 24px; }
        .auth-section.hidden { display: none; }

        /* 🔹 Список товаров */
        .product-list { list-style: none; }
        .product-item { display: flex; justify-content: space-between; align-items: center;
                        padding: 12px; border: 1px solid #eee; border-radius: 4px; margin-bottom: 8px; }
        .product-info { flex: 1; }
        .product-name { font-weight: 600; color: #333; }
        .product-price { color: #28a745; font-weight: 500; }
        .product-meta { font-size: 12px; color: #666; margin-top: 4px; }
        .product-actions { display: flex; gap: 8px; }

        /* 🔹 Модальное окно */
        #edit-modal { display: none; }
        #edit-modal.show { display: flex; }
        #edit-modal form .form-group { margin-bottom: 12px; }
        #edit-modal input, #edit-modal textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }

        /* 🔹 Спиннер загрузки */
        .loading { text-align: center; padding: 20px; color: #666; }
        .loading.hidden { display: none; }

        /* 🔹 Пустое состояние */
        .empty { text-align: center; padding: 40px; color: #999; }

        #edit-modal.show {
            display: flex !important;
        }

        /* 🔹 Скрытие элементов */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ SFMShop Admin Panel</h1>

        <!-- 🔹 Сообщения -->
        <div id="message" class="message"></div>

        <!-- 🔹 Секция авторизации -->
        <div id="auth-section" class="auth-section">
            <h2>🔐 Авторизация</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required
                           placeholder="admin@example.com" value="your_mail@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required
                           placeholder="••••••••" value="stringst">
                </div>
                <button type="submit">Войти</button>
                <button type="button" class="secondary" onclick="showRegister()" style="margin-left: 8px;">📝 Нет аккаунта? Регистрация</button>
            </form>

            <!-- 🔹 Форма регистрации (добавь после формы логина) -->
            <div id="register-section" class="hidden" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
                <h3 style="margin-bottom: 16px;">📝 Регистрация нового админа</h3>

                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-email">Email *</label>
                        <input type="email" id="reg-email" name="email" required placeholder="admin@example.com">
                    </div>
                    <div class="form-group">
                        <label for="reg-username">Логин *</label>
                        <input type="text" id="reg-username" name="username" required minlength="3" placeholder="admin">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Пароль *</label>
                        <input type="password" id="reg-password" name="password" required minlength="6" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="reg-first-name">Имя</label>
                        <input type="text" id="reg-first-name" name="first_name" placeholder="Иван">
                    </div>
                    <div class="form-group">
                        <label for="reg-last-name">Фамилия</label>
                        <input type="text" id="reg-last-name" name="last_name" placeholder="Иванов">
                    </div>

                    <button type="submit">🎉 Зарегистрироваться</button>
                    <button type="button" class="secondary" onclick="showLogin()" style="margin-left: 8px;">← Назад ко входу</button>
                </form>
            </div>

        </div>

        <!-- 🔹 Секция контента (скрыта до авторизации) -->
        <div id="content-section" class="auth-section hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0;">👋 Привет, <span id="user-email"></span></h2>
                <button class="secondary" id="logout-btn">Выйти</button>
            </div>

            <!-- 🔹 Форма создания товара -->
            <h2>Создать товар: </h2>
            <form id="product-form">
                <div class="form-group">
                    <label for="name">Название *</label>
                    <input type="text" id="name" name="name" required placeholder="Например: Кружка керамическая">
                </div>
                <div class="form-group">
                    <label for="price">Цена *</label>
                    <input type="number" id="price" name="price" required step="0.01" min="0" placeholder="999.99">
                </div>
                <div class="form-group">
                    <label for="description">Описание</label>
                    <textarea id="description" name="description" rows="3" placeholder="Подробное описание товара..."></textarea>
                </div>
                <div class="form-group">
                    <label for="sku">Артикул (SKU)</label>
                    <input type="text" id="sku" name="sku" placeholder="ART-001">
                </div>
                <div class="form-group">
                    <label for="stock_quantity">Остаток на складе</label>
                    <input type="number" id="stock_quantity" name="stock_quantity" value="0" min="0">
                </div>
                <button type="submit">Создать товар</button>
            </form>

            <!-- 🔹 Список товаров -->
            <h2>📦 Список товаров</h2>
            <div id="loading" class="loading">Загрузка товаров...</div>
            <ul id="product-list" class="product-list"></ul>
            <div id="empty" class="empty hidden">Товаров пока нет. Создайте первый! 🎉</div>
        </div>
    </div>

    <!-- 🔹 Модальное окно редактирования товара -->
    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:24px; border-radius:8px; max-width:500px; width:90%;
             max-height:90vh; overflow-y:auto; box-shadow:0 4px 20px rgba(0,0,0,0.2);">
            <h3 style="margin:0 0 16px;">✏️ Редактировать товар</h3>

            <form id="edit-form">
                <input type="hidden" id="edit-product-id">

                <div class="form-group">
                    <label for="edit-name">Название *</label>
                    <input type="text" id="edit-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="edit-price">Цена *</label>
                    <input type="number" id="edit-price" name="price" required step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label for="edit-description">Описание</label>
                    <textarea id="edit-description" name="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-sku">Артикул (SKU)</label>
                    <input type="text" id="edit-sku" name="sku">
                </div>
                <div class="form-group">
                    <label for="edit-stock">Остаток</label>
                    <input type="number" id="edit-stock" name="stock_quantity" min="0">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="edit-available" name="is_available" style="width:auto; margin-right:8px;">
                        Доступен для заказа
                    </label>
                </div>

                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button type="button" class="secondary" onclick="closeEditModal()">Отмена</button>
                    <button type="submit">💾 Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 🔹 Глобальные переменные
        const API_BASE = '/api/v1';
        let authToken = localStorage.getItem('auth_token');

        // 🔹 DOM элементы
        const messageEl = document.getElementById('message');
        const authSection = document.getElementById('auth-section');
        const contentSection = document.getElementById('content-section');
        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const userEmailEl = document.getElementById('user-email');
        const productForm = document.getElementById('product-form');
        const productList = document.getElementById('product-list');
        const loadingEl = document.getElementById('loading');
        const emptyEl = document.getElementById('empty');

        // 🔹 Показать сообщение
        function showMessage(text, type = 'success') {
            messageEl.textContent = text;
            messageEl.className = `message ${type} show`;
            setTimeout(() => messageEl.classList.remove('show'), 5000);
        }

        // 🔹 Проверка авторизации при загрузке
        async function checkAuth() {
            if (!authToken) {
                showAuth();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    showContent(user);
                } else {
                    throw new Error('Token invalid');
                }
            } catch (e) {
                console.error('Auth check failed:', e);
                logout();
            }
        }

        // 🔹 Показать секцию авторизации
        function showAuth() {
            authSection.classList.remove('hidden');
            contentSection.classList.add('hidden');
        }

        // 🔹 Показать секцию контента
        function showContent(user) {
            authSection.classList.add('hidden');
            contentSection.classList.remove('hidden');
            userEmailEl.textContent = user.email;
            loadProducts();
        }

        // 🔹 Логин
        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Login failed');
                }

                const data = await response.json();
                authToken = data.access_token;
                localStorage.setItem('auth_token', authToken);

                showMessage('✅ Успешный вход!');

                // Получаем данные пользователя
                const userResponse = await fetch(`${API_BASE}/users/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const user = await userResponse.json();
                showContent(user);

            } catch (e) {
                showMessage(`❌ ${e.message}`, 'error');
            }
        }

        // 🔹 Логаут
        function logout() {
            authToken = null;
            localStorage.removeItem('auth_token');
            showMessage('👋 Вы вышли из системы');
            showAuth();
        }

        // 🔹 Показать форму регистрации
        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-section').classList.remove('hidden');
        }

        // 🔹 Показать форму входа
        function showLogin() {
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        // 🔹 Обработчик регистрации
        async function handleRegister(e) {
            e.preventDefault();

            const userData = {
                email: document.getElementById('reg-email').value.trim(),
                username: document.getElementById('reg-username').value.trim(),
                password: document.getElementById('reg-password').value,
                first_name: document.getElementById('reg-first-name').value.trim() || null,
                last_name: document.getElementById('reg-last-name').value.trim() || null
            };

            console.log('🔹 Отправляем данные:', userData);  // 🆕 Отладка

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    console.error('❌ Ошибка от сервера:', error);  // 🆕 Показываем детальную ошибку
                    throw new Error(error.detail?.[0]?.msg || error.detail || 'Registration failed');
                }

                const user = await response.json();
                showMessage(`✅ ${user.username} зарегистрирован! Теперь войдите.`, 'success');

                document.getElementById('register-form').reset();
                showLogin();

            } catch (e) {
                console.error('❌ Ошибка регистрации:', e);  // 🆕
                showMessage(`❌ ${e.message}`, 'error');
            }
        }

        // 🔹 Подключаем обработчик к форме регистрации
        document.getElementById('register-form').addEventListener('submit', handleRegister);

        // 🔹 Загрузка списка товаров
        async function loadProducts() {
            loadingEl.classList.remove('hidden');
            productList.innerHTML = '';

            // ✅ Явно скрываем сообщение "пусто" в начале загрузки
            emptyEl.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/products?limit=50`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) throw new Error('Failed to load products');

                const products = await response.json();

                // ✅ ПРОВЕРКА: если товаров 0 — показываем сообщение
                if (products.length === 0) {
                    emptyEl.classList.remove('hidden');  // ✅ Показываем "Товаров нет"
                } else {
                    emptyEl.classList.add('hidden');     // ✅ Скрываем "Товаров нет"

                    // Рисуем список товаров
                    products.forEach(product => {
                        const li = document.createElement('li');
                        li.className = 'product-item';
                        li.innerHTML = `
                            <div class="product-info">
                                <div class="product-name">${escapeHtml(product.name)}</div>
                                <div class="product-price">${product.price} ${product.currency}</div>
                                <div class="product-meta">
                                    ${product.sku ? `SKU: ${escapeHtml(product.sku)} • ` : ''}
                                    Остаток: ${product.stock_quantity} •
                                    ${product.is_available ? '✅ В наличии' : '❌ Нет в наличии'}
                                </div>
                                ${product.description ? `<div style="margin-top:4px;color:#666;font-size:13px">${escapeHtml(product.description)}</div>` : ''}
                            </div>
                            <div class="product-actions">
                                <button class="secondary" onclick="editProduct(${product.id})">✏️</button>
                                <button class="danger" onclick="deleteProduct(${product.id})">🗑️</button>
                            </div>
                        `;
                        productList.appendChild(li);
                    });
                }
            } catch (e) {
                showMessage(`❌ Ошибка загрузки: ${e.message}`, 'error');
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        // 🔹 Создание товара
        async function handleCreateProduct(e) {
            e.preventDefault();

            const product = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                description: document.getElementById('description').value || null,
                sku: document.getElementById('sku').value || null,
                stock_quantity: parseInt(document.getElementById('stock_quantity').value) || 0,
                currency: 'RUB',
                is_available: true
            };

            try {
                const response = await fetch(`${API_BASE}/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(product)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail?.[0]?.msg || error.detail || 'Creation failed');
                }

                showMessage('✅ Товар создан!');
                productForm.reset();
                loadProducts();

            } catch (e) {
                showMessage(`❌ ${e.message}`, 'error');
            }
        }

        // 🔹 Удаление товара
        async function deleteProduct(productId) {
            if (!confirm('Удалить этот товар?')) return;

            try {
                const response = await fetch(`${API_BASE}/products/${productId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) throw new Error('Delete failed');

                showMessage('✅ Товар удалён');
                loadProducts();

            } catch (e) {
                showMessage(`❌ ${e.message}`, 'error');
            }
        }


// 🔹 Открываем модальное окно и загружаем данные товара
async function editProduct(productId) {
    try {
        showMessage('🔄 Загрузка данных...', 'success');

        const response = await fetch(`${API_BASE}/products/${productId}`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Не удалось загрузить товар');

        const product = await response.json();

        // Заполняем форму
        document.getElementById('edit-product-id').value = product.id;
        document.getElementById('edit-name').value = product.name;
        document.getElementById('edit-price').value = product.price;
        document.getElementById('edit-description').value = product.description || '';
        document.getElementById('edit-sku').value = product.sku || '';
        document.getElementById('edit-stock').value = product.stock_quantity;
        document.getElementById('edit-available').checked = product.is_available;

        // Показываем модальное окно
        document.getElementById('edit-modal').classList.add('show');

            } catch (e) {
                showMessage(`❌ ${e.message}`, 'error');
            }
        }

        // 🔹 Закрываем модальное окно
        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('show');
            document.getElementById('edit-form').reset();
        }

        // 🔹 Обработчик сохранения изменений
        async function handleEditProduct(e) {
            e.preventDefault();

            const productId = document.getElementById('edit-product-id').value;

            const updatedProduct = {
                name: document.getElementById('edit-name').value,
                price: parseFloat(document.getElementById('edit-price').value),
                description: document.getElementById('edit-description').value || null,
                sku: document.getElementById('edit-sku').value || null,
                stock_quantity: parseInt(document.getElementById('edit-stock').value) || 0,
                is_available: document.getElementById('edit-available').checked
            };

            try {
                const response = await fetch(`${API_BASE}/products/${productId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(updatedProduct)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail?.[0]?.msg || error.detail || 'Update failed');
                }

                showMessage('✅ Товар обновлён!');
                closeEditModal();
                loadProducts();

            } catch (e) {
                showMessage(`❌ ${e.message}`, 'error');
            }
        }

        // 🔹 Экранирование HTML (защита от XSS)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 🔹 Обработчики событий
        loginForm.addEventListener('submit', handleLogin);
        logoutBtn.addEventListener('click', logout);
        productForm.addEventListener('submit', handleCreateProduct);
        document.getElementById('edit-form').addEventListener('submit', handleEditProduct);
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });


        // 🔹 Инициализация
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
